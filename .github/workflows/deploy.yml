name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 1. Sync Images (Combined)
      # AWS CLI automatically detects correct content-types (image/png, image/webp) 
      # so you don't need separate steps. 
      - name: Sync Images (Immutable Cache)
        run: |
          aws s3 sync ./images s3://bulkplaintshirt.com/catalog/images/ \
            --delete \
            --size-only \
            --cache-control "public, max-age=31536000, immutable"

      # 2. Sync CSS & JS
      - name: Sync CSS and JS
        run: |
          aws s3 sync ./css s3://bulkplaintshirt.com/catalog/css/ \
            --delete \
            --size-only \
            --cache-control "public, max-age=86400"
          aws s3 sync ./js s3://bulkplaintshirt.com/catalog/js/ \
            --delete \
            --size-only \
            --cache-control "public, max-age=86400"

      # 3. Sync Root & HTML Files (Aggressive cache invalidation for entry points)
      - name: Sync HTML and Root Configs
        run: |
          aws s3 sync . s3://bulkplaintshirt.com/catalog/ \
            --delete \
            --size-only \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "generate-pages.js" \
            --exclude ".nojekyll" \
            --exclude "images/*" \
            --exclude "css/*" \
            --exclude "js/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      # 4. Smart Invalidation
      # Cover directory URLs (e.g. /catalog/, /catalog/p/<slug>/) which don't end in .html,
      # plus all HTML, CSS, JS, JSON, and TXT entry points. Leave images cached at the edge.
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E21QLU9SBUBY7Z \
            --paths \
              "/catalog/" \
              "/catalog/index.html" \
              "/catalog/p/*" \
              "/catalog/*.html" \
              "/catalog/*.json" \
              "/catalog/*.txt" \
              "/catalog/*.xml" \
              "/catalog/css/*" \
              "/catalog/js/*" \
              "/catalog/.well-known/*"
