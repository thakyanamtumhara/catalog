name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Detect changed files (dry run)
        id: detect
        run: |
          aws s3 sync . s3://bulkplaintshirt.com/catalog/ \
            --dryrun \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "generate-pages.js" \
            --exclude ".nojekyll" \
            --exclude "cloudfront/*" \
            | grep -oP 's3://bulkplaintshirt\.com/catalog/\K.*' \
            | sed 's|^|/catalog/|' \
            > /tmp/changed-paths.txt || true
          echo "Changed files:"
          cat /tmp/changed-paths.txt
          echo "count=$(wc -l < /tmp/changed-paths.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync . s3://bulkplaintshirt.com/catalog/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "generate-pages.js" \
            --exclude ".nojekyll" \
            --exclude "cloudfront/*"

      - name: Set cache headers for images
        run: |
          aws s3 sync ./images s3://bulkplaintshirt.com/catalog/images/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Set cache headers for CSS/JS
        run: |
          aws s3 sync ./css s3://bulkplaintshirt.com/catalog/css/ \
            --cache-control "public, max-age=86400"
          aws s3 sync ./js s3://bulkplaintshirt.com/catalog/js/ \
            --cache-control "public, max-age=86400"

      - name: Deploy CloudFront URL Rewrite Function
        run: |
          FUNC_NAME="catalog-url-rewrite"
          DIST_ID="E21QLU9SBUBY7Z"

          # Create or update the function
          ETAG=$(aws cloudfront describe-function --name $FUNC_NAME --query 'ETag' --output text 2>/dev/null || echo "")
          if [ -z "$ETAG" ]; then
            echo "Creating new CloudFront Function..."
            aws cloudfront create-function \
              --name $FUNC_NAME \
              --function-config '{"Comment":"Rewrite URIs to index.html for S3","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://cloudfront/url-rewrite.js
          else
            echo "Updating existing CloudFront Function..."
            aws cloudfront update-function \
              --name $FUNC_NAME \
              --if-match $ETAG \
              --function-config '{"Comment":"Rewrite URIs to index.html for S3","Runtime":"cloudfront-js-2.0"}' \
              --function-code fileb://cloudfront/url-rewrite.js
          fi

          # Publish the function
          ETAG=$(aws cloudfront describe-function --name $FUNC_NAME --query 'ETag' --output text)
          FUNC_ARN=$(aws cloudfront describe-function --name $FUNC_NAME --query 'FunctionSummary.FunctionMetadata.FunctionARN' --output text)
          aws cloudfront publish-function --name $FUNC_NAME --if-match $ETAG
          echo "Published function: $FUNC_ARN"

          # Associate function with distribution's default cache behavior
          aws cloudfront get-distribution-config --id $DIST_ID > /tmp/dist-config.json
          DIST_ETAG=$(jq -r '.ETag' /tmp/dist-config.json)

          # Check if already associated
          EXISTING_ARN=$(jq -r '.DistributionConfig.DefaultCacheBehavior.FunctionAssociations.Items[]? | select(.EventType=="viewer-request") | .FunctionARN' /tmp/dist-config.json 2>/dev/null || echo "")
          if [ "$EXISTING_ARN" = "$FUNC_ARN" ]; then
            echo "Function already associated with distribution, skipping."
          else
            echo "Associating function with distribution..."
            jq --arg arn "$FUNC_ARN" \
              '.DistributionConfig.DefaultCacheBehavior.FunctionAssociations = {
                "Quantity": 1,
                "Items": [{"FunctionARN": $arn, "EventType": "viewer-request"}]
              }' /tmp/dist-config.json | jq '.DistributionConfig' > /tmp/update-config.json
            aws cloudfront update-distribution \
              --id $DIST_ID \
              --if-match $DIST_ETAG \
              --distribution-config file:///tmp/update-config.json
            echo "Distribution updated with URL rewrite function."
          fi

      - name: Invalidate changed paths in CloudFront
        if: steps.detect.outputs.count != '0'
        run: |
          PATHS=$(cat /tmp/changed-paths.txt | head -50 | tr '\n' ' ')
          echo "Invalidating: $PATHS"
          aws cloudfront create-invalidation \
            --distribution-id E21QLU9SBUBY7Z \
            --paths $PATHS
